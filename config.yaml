# Blood Smear Domain Expert - Configuration
# All configurable parameters for the blood smear analysis pipeline

# ============================================================================
# MODEL PATHS
# ============================================================================
models:
  yolo_detection: "models/yolov8s_blood.pt"
  efficientnet_classification: "models/efficientnet_wbc_finetuned.pt"
  # Optional override directory via env: THESIS_MODELS_DIR

# ============================================================================
# DETECTION PARAMETERS (YOLOv8 Stage 1)
# ============================================================================
detection:
  confidence_threshold: 0.50  # Minimum confidence for detections (0.0-1.0)
  device: "auto"  # 'auto', 'cpu', 'cuda', or device ID (0, 1, etc.)
  max_images_per_batch: null  # null for unlimited
  fail_fast: false  # Stop on first error (true) or skip failures (false)
  
  # Class definitions
  canonical_classes:
    - "WBC"
    - "RBC"
    - "Platelet"
  
  # Visualization settings
  visualization:
    grid_columns: 3
    max_images_to_plot: 6
    show_aggregate_stats: true
    colors:
      WBC: "#FF6B6B"
      RBC: "#4ECDC4"
      Platelet: "#95E1D3"

# ============================================================================
# CLASSIFICATION PARAMETERS (EfficientNet Stage 2)
# ============================================================================
classification:
  # Monte Carlo Dropout settings
  mc_dropout_passes: 20  # Number of stochastic forward passes for uncertainty
  
  # Uncertainty thresholds
  uncertainty:
    low:
      min_confidence: 0.85
      max_entropy: 0.3
    medium:
      min_confidence: 0.65
      max_entropy: 0.6
    # HIGH uncertainty: anything below medium thresholds
  
  # WBC subtype classes (8 classes)
  wbc_classes:
    - "basophil"
    - "eosinophil"
    - "erythroblast"
    - "ig"
    - "lymphocyte"
    - "monocyte"
    - "neutrophil"
    - "platelet"
  
  # Image preprocessing
  image_size: 224  # Input size for EfficientNet-B0
  normalization:
    mean: [0.485, 0.456, 0.406]  # ImageNet stats
    std: [0.229, 0.224, 0.225]

  # Grad-CAM interpretability (per-WBC attention heatmaps)
  gradcam:
    enabled: true   # Set false to skip Grad-CAM computation entirely
    alpha: 0.45     # Heatmap blend strength (0=image only, 1=heatmap only)

# ============================================================================
# REASONING (Stage 3 mode selection)
# ============================================================================
reasoning:
  # 'linear' — single-shot LLM call grounded by retrieved context (default).
  # 'agent'  — LangChain ReAct agent that iteratively calls tools
  #            (knowledge_base, lab_reference_ranges, differential_review,
  #             uncertainty_summary) before producing the final report.
  mode: "agent"
  agent:
    max_iterations: 6
    return_intermediate_steps: true

# ============================================================================
# RAG PARAMETERS (Retrieval-Augmented Generation Stage 3)
# ============================================================================
rag:
  # PDF knowledge base
  # Default local knowledge-base folder for Stage 3 assets.
  # Add the files listed in rag.pdf_sources under this directory.
  pdf_directory: "data/pdfs"
  pdf_sources:
    - "essentials_haematology.pdf"
    - "consie_haematology.pdf"
  # Missing PDF behavior: 'fail' (strict), 'warn' (continue partial), 'download' (fetch from base URL)
  pdf_missing_strategy: "fail"
  pdf_download_base_url: ""
  pdf_download_timeout_seconds: 30
  
  # Text chunking
  # Note: 'sentence-transformers/all-MiniLM-L6-v2' has a 256-token context.
  # Keeping chunks <= 200 words avoids silent truncation during embedding.
  chunking:
    chunk_size: 200  # Words per chunk
    overlap: 40  # Word overlap between chunks
  
  # Embedding model
  embedding:
    model_name: "sentence-transformers/all-MiniLM-L6-v2"
    embedding_dim: 384
    batch_size: 64  # For batch encoding
  
  # Vector store
  vector_store:
    type: "chromadb"  # 'chromadb' or 'numpy_fallback'
    chromadb_path: "data/chroma_db"
    collection_name: "hematology_knowledge"
    distance_metric: "cosine"
  
  # Retrieval settings
  retrieval:
    top_k: 5  # Number of chunks to retrieve
    min_chunk_length: 80  # Minimum chars for valid retrieval
    insufficient_evidence_threshold: 80  # Trigger INSUFFICIENT_EVIDENCE flag

  # Internet-backed augmentation
  # When enabled, Stage 3 supplements local PDF evidence with best-effort web retrieval.
  # SECURITY: arbitrary web content is fed to the LLM. Always pair with
  # an allow-list of trusted domains. Disabled by default.
  internet:
    enabled: false
    top_k: 3
    search_timeout_seconds: 10
    fetch_timeout_seconds: 10
    max_chars_per_source: 4000
    user_agent: "BloodSmearDomainExpert/1.0"
    allowed_domains:
      - "ncbi.nlm.nih.gov"
      - "pubmed.ncbi.nlm.nih.gov"
      - "medlineplus.gov"
      - "who.int"
      - "nih.gov"
      - "hematology.org"

# ============================================================================
# LLM REASONING PARAMETERS
# ============================================================================
# Default: OpenAI GPT-4o (cloud, paid).
# To switch to the self-hosted domain-expert fine-tune (Afridi07/hematology-llama-3.1-8b-lora),
# serve it with vLLM / HF Inference Endpoints / RunPod and set:
#   llm.model_name: "Afridi07/hematology-llama-3.1-8b-lora"
#   .env -> OPENAI_BASE_URL=https://<your-endpoint>/v1
#           OPENAI_API_KEY=dummy   (vLLM ignores it; some hosts need a token)
# Stage 3 talks OpenAI-compatible REST so no code change is required.
llm:
  # OpenAI API settings
  model_name: "gpt-4o"
  api_key_env_var: "OPENAI_API_KEY"  # Environment variable name
  temperature: 0.1  # Low temperature for consistent medical reasoning
  max_tokens: 1500
  
  # Safety and abstention settings
  safety:
    enable_abstention: true  # Allow model to abstain when uncertain
    propagate_vision_uncertainty: true  # Include vision uncertainty in prompts
    require_citations: true  # Enforce citation-attached claims
  
  # Output format
  output:
    format: "json"  # Structured JSON output
    include_metadata: true  # Add timestamps, versions, etc.

# ============================================================================
# PIPELINE ORCHESTRATION
# ============================================================================
pipeline:
  # Execution modes
  enable_stage1: true  # Detection
  enable_stage2: true  # Classification
  enable_stage3: true  # RAG reasoning
  
  # Error handling
  continue_on_error: true  # Continue pipeline even if one stage fails
  save_intermediate_results: true  # Save outputs from each stage
  
  # Output directories
  output:
    results_dir: "results"
    figures_dir: "figures"
    logs_dir: "logs"
    metadata_dir: "results/metadata"

# ============================================================================
# LOGGING
# ============================================================================
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    console: true  # Log to console
    file: true  # Log to file
    file_path: "logs/pipeline_{timestamp}.log"
  
  # Module-specific log levels (optional overrides)
  module_levels:
    src.detection: "INFO"
    src.classification: "INFO"
    src.rag: "INFO"
    src.pipeline: "INFO"

# ============================================================================
# SYSTEM SETTINGS
# ============================================================================
system:
  random_seed: 42  # For reproducibility (Python, NumPy, PyTorch RNGs)
  deterministic_torch: false  # Set true for strict cuDNN determinism (slower)
  num_workers: 4  # For data loading
  batch_size: 32  # For batch operations
  device_fallback: "cpu"  # Fallback if GPU unavailable
